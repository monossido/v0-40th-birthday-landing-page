<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" aria-label="LOTR inspired ring favicon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#2b2b24" />
      <stop offset="100%" stop-color="#11110f" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d36d" />
      <stop offset="50%" stop-color="#c08b2f" />
      <stop offset="100%" stop-color="#ffe79a" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bg)" />

  <!-- One Ring inspired band -->
  <circle cx="128" cy="128" r="80" fill="none" stroke="url(#gold)" stroke-width="24" filter="url(#glow)" />

  <!-- Minimal rune-like mark -->
  <path d="M128 86v84M128 88l24 20M128 88l-24 20" fill="none" stroke="#ffd56f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />

  <!-- tiny spark for warmth -->
  <circle cx="176" cy="88" r="5" fill="#ffe7a4" opacity="0.95" />
</svg>
